name: Groovy Syntax Check

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download and install Groovy
        shell: pwsh
        run: winget install --id Apache.Groovy.5 --silent --accept-package-agreements --accept-source-agreements

      - name: Run Groovy syntax check
        shell: pwsh
        run: .\scripts\Check-GroovySyntax.ps1
